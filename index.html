<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>うなぎ管理 - クラウド共有版</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2614/2614364.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;600&display=swap');
        body { font-family: 'Kiwi Maru', serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .unagi-card { transition: all 0.2s ease; }
        input, textarea { font-size: 16px !important; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800">
    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
            <p id="loading-text" class="text-sm font-bold text-slate-600 tracking-widest">データベースに接続中...</p>
            <p id="error-display" class="text-red-500 text-xs mt-4 hidden font-bold"></p>
            <button id="force-close-loader" onclick="hideLoader()" class="mt-8 text-xs text-blue-500 underline hidden">オフラインで開始する</button>
        </div>
    </div>

    <div id="sync-modal" class="modal">
        <div class="bg-white p-6 rounded-3xl w-80 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-slate-800">共有キーの設定</h3>
            <p class="text-[11px] text-slate-500 mb-4 leading-relaxed">同じ「合言葉」を入力した端末同士でデータが同期されます。</p>
            <input type="text" id="sync-key-input" placeholder="例: my-unagi-farm" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 mb-4 focus:border-blue-400 outline-none transition-colors">
            <button onclick="saveSyncKey()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">設定を保存して更新</button>
            <button onclick="hideSyncModal()" class="w-full text-slate-400 text-xs mt-4">キャンセル</button>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto">
        <header class="text-center mb-8 pt-4 relative">
            <button onclick="showSyncModal()" class="absolute right-0 top-0 p-3 bg-white rounded-full shadow-sm text-slate-400 hover:text-blue-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <h1 class="text-2xl md:text-3xl font-bold tracking-tight text-slate-900 mb-1">うなぎ仔魚日齢管理</h1>
            <div id="current-date-display" class="text-sm md:text-lg font-bold text-blue-600">----/--/--</div>
            <div id="sync-status" class="text-[9px] text-slate-400 font-bold mt-2 uppercase tracking-widest flex items-center justify-center gap-2">
                <span id="status-indicator" class="w-1.5 h-1.5 rounded-full bg-slate-300"></span>
                合言葉: <span id="active-key-name" class="text-slate-600">--</span>
            </div>
        </header>

        <div id="tanks-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 pb-20"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'unagi-v11';
        let syncKey = localStorage.getItem('unagi_sync_key') || 'unagi';
        const tankCount = 10;

        // UI Themes
        const colorThemes = [
            { border: '#3b82f6', bg: '#eff6ff', text: '#1d4ed8' },
            { border: '#10b981', bg: '#ecfdf5', text: '#047857' },
            { border: '#6366f1', bg: '#eef2ff', text: '#4338ca' },
            { border: '#8b5cf6', bg: '#f5f3ff', text: '#6d28d9' },
            { border: '#f43f5e', bg: '#fff1f2', text: '#be123c' },
            { border: '#f59e0b', bg: '#fffbeb', text: '#b45309' },
            { border: '#06b6d4', bg: '#ecfeff', text: '#0e7490' },
            { border: '#14b8a6', bg: '#f0fdfa', text: '#0f766e' },
            { border: '#d946ef', bg: '#fdf4ff', text: '#a21caf' },
            { border: '#64748b', bg: '#f8fafc', text: '#334155' }
        ];

        window.hideLoader = () => {
            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 300);
        };

        window.showSyncModal = () => {
            document.getElementById('sync-key-input').value = syncKey;
            document.getElementById('sync-modal').style.display = 'flex';
        };

        window.hideSyncModal = () => {
            document.getElementById('sync-modal').style.display = 'none';
        };

        window.saveSyncKey = () => {
            const val = document.getElementById('sync-key-input').value.trim().replace(/\//g, '-');
            if (val) {
                localStorage.setItem('unagi_sync_key', val);
                location.reload();
            }
        };

        const calculateAge = (birthDateStr) => {
            if (!birthDateStr) return "--";
            const bDate = new Date(birthDateStr);
            bDate.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diffDays = Math.floor((today - bDate) / (1000 * 60 * 60 * 24));
            return isNaN(diffDays) ? "--" : Math.max(0, diffDays);
        };

        window.saveData = async (index) => {
            const el = (id) => document.getElementById(id);
            const data = {
                tankLabel: el(`tank-label-${index}`).value,
                initial: el(`initial-${index}`).value,
                currentCount: el(`current-count-${index}`).value,
                birthDate: el(`date-${index}`).value,
                origin: el(`origin-${index}`).value,
                note: el(`note-${index}`).value,
                updatedAt: new Date().toISOString()
            };

            // Local Update
            el(`age-${index}`).innerText = calculateAge(data.birthDate);
            const iV = parseFloat(data.initial) || 0;
            const cV = parseFloat(data.currentCount) || 0;
            el(`rate-${index}`).innerText = (iV > 0 ? (cV/iV*100) : 0).toFixed(1) + "%";

            // Firestore Update
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', syncKey, `tank_${index}`);
                await setDoc(docRef, data, { merge: true });
            } catch (e) {
                console.error("Save Error:", e);
            }
        };

        function createUI() {
            const container = document.getElementById('tanks-container');
            let html = '';
            for (let i = 0; i < tankCount; i++) {
                const theme = colorThemes[i % colorThemes.length];
                html += `
                <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-5 unagi-card flex flex-col gap-4">
                    <div class="flex justify-between items-center">
                        <input type="text" id="tank-label-${i}" value="Tank ${String(i+1).padStart(2,'0')}" 
                               style="background-color: ${theme.bg}; color: ${theme.text}"
                               class="px-4 py-1.5 rounded-full text-[11px] font-bold border-none w-28 focus:ring-2 focus:ring-blue-200 outline-none" 
                               onchange="saveData(${i})">
                        <div class="w-2 h-2 rounded-full" style="background-color: ${theme.border}"></div>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[9px] font-bold text-slate-400 ml-1 mb-1 block uppercase">Input</label>
                                <input type="number" id="initial-${i}" placeholder="0" class="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm font-bold border-none focus:bg-white transition-colors outline-none" oninput="saveData(${i})">
                            </div>
                            <div>
                                <label class="text-[9px] font-bold text-slate-400 ml-1 mb-1 block uppercase">Alive</label>
                                <input type="number" id="current-count-${i}" placeholder="0" class="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm font-bold border-none focus:bg-white transition-colors outline-none" oninput="saveData(${i})">
                            </div>
                        </div>
                        <div class="flex justify-between items-center p-3 rounded-xl border border-slate-100" style="background-color: ${theme.bg}22">
                            <span class="text-[10px] font-bold text-slate-400">生存率</span>
                            <span id="rate-${i}" class="font-black text-sm" style="color: ${theme.text}">0.0%</span>
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 ml-1 mb-1 block">生誕日</label>
                            <input type="date" id="date-${i}" class="w-full bg-slate-50 rounded-xl px-3 py-2 text-xs border-none outline-none" onchange="saveData(${i})">
                        </div>
                        <input type="text" id="origin-${i}" placeholder="生誕地/由来" class="w-full bg-slate-50 rounded-xl px-3 py-2 text-xs border-none outline-none" onchange="saveData(${i})">
                        <textarea id="note-${i}" rows="2" placeholder="メモ..." class="w-full bg-slate-50 rounded-xl px-3 py-2 text-[11px] border-none resize-none outline-none" onchange="saveData(${i})"></textarea>
                    </div>
                    <div class="mt-auto pt-2">
                        <div class="text-center py-5 rounded-2xl border" style="border-color: ${theme.bg}; background: linear-gradient(135deg, #fff, ${theme.bg}88)">
                            <div id="age-${i}" class="text-4xl font-black text-slate-800 tracking-tighter">--</div>
                            <div class="text-[10px] font-bold uppercase tracking-widest mt-1" style="color: ${theme.text}aa">Days Old</div>
                        </div>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                return true;
            } catch (e) {
                console.error("Auth Error:", e);
                document.getElementById('error-display').innerText = "認証に失敗しました。再読み込みしてください。";
                document.getElementById('error-display').classList.remove('hidden');
                return false;
            }
        }

        function startSync() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', syncKey);
            
            // Initial data fetch and watch
            const unsubscribe = onSnapshot(colRef, (snap) => {
                document.getElementById('status-indicator').classList.replace('bg-slate-300', 'bg-green-400');
                document.getElementById('status-indicator').classList.add('animate-pulse');
                
                snap.docChanges().forEach(change => {
                    const docId = change.doc.id;
                    if (docId.startsWith('tank_')) {
                        const idx = parseInt(docId.split('_').pop());
                        if (isNaN(idx) || idx >= tankCount) return;

                        const data = change.doc.data();
                        const el = (id) => document.getElementById(id);
                        
                        // Prevent overwriting active inputs
                        if (document.activeElement !== el(`tank-label-${idx}`)) el(`tank-label-${idx}`).value = data.tankLabel || `Tank ${String(idx+1).padStart(2,'0')}`;
                        if (document.activeElement !== el(`initial-${idx}`)) el(`initial-${idx}`).value = data.initial || "";
                        if (document.activeElement !== el(`current-count-${idx}`)) el(`current-count-${idx}`).value = data.currentCount || "";
                        if (document.activeElement !== el(`date-${idx}`)) el(`date-${idx}`).value = data.birthDate || "";
                        if (document.activeElement !== el(`origin-${idx}`)) el(`origin-${idx}`).value = data.origin || "";
                        if (document.activeElement !== el(`note-${idx}`)) el(`note-${idx}`).value = data.note || "";
                        
                        // Update calculated fields
                        el(`age-${idx}`).innerText = calculateAge(data.birthDate);
                        const iV = parseFloat(data.initial) || 0, cV = parseFloat(data.currentCount) || 0;
                        el(`rate-${idx}`).innerText = (iV > 0 ? (cV/iV*100) : 0).toFixed(1) + "%";
                    }
                });
                
                hideLoader();
            }, (err) => {
                console.error("Snapshot Error:", err);
                hideLoader();
            });
        }

        function displayToday() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            document.getElementById('current-date-display').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${days[now.getDay()]})`;
        }

        window.onload = async () => {
            displayToday();
            createUI();
            document.getElementById('active-key-name').innerText = syncKey;

            // Timeout fallback
            setTimeout(() => {
                document.getElementById('force-close-loader').classList.remove('hidden');
                document.getElementById('loading-text').innerText = "通信に時間がかかっています...";
            }, 6000);

            const authSuccess = await initAuth();
            if (authSuccess) {
                onAuthStateChanged(auth, (user) => {
                    if (user) startSync();
                });
            }
        };
    </script>
</body>
</html>
