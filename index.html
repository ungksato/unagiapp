<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>うなぎ管理 - クラウド共有版</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2614/2614364.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;600&display=swap');
        body { font-family: 'Kiwi Maru', serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .unagi-card { transition: all 0.2s ease; }
        input, textarea { font-size: 16px !important; }
        .loading-overlay { position: fixed; inset: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800">
    <div id="loading" class="loading-overlay">
        <div class="text-center">
            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-xs font-bold text-slate-400 tracking-widest uppercase">同期中...</p>
        </div>
    </div>

    <!-- 共有キー設定モーダル -->
    <div id="sync-modal" class="modal">
        <div class="bg-white p-6 rounded-3xl w-80 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">共有キーの設定</h3>
            <p class="text-[10px] text-slate-500 mb-4">別の合言葉でデータを分けたい場合は入力してください。</p>
            <input type="text" id="sync-key-input" placeholder="例: unagi" class="w-full border-2 border-slate-100 rounded-xl px-4 py-2 mb-4 focus:border-blue-300 outline-none">
            <button onclick="saveSyncKey()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">設定を保存</button>
            <button onclick="hideSyncModal()" class="w-full text-slate-400 text-xs mt-4">キャンセル</button>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto">
        <header class="text-center mb-8 pt-4 relative">
            <button onclick="showSyncModal()" class="absolute right-0 top-0 p-2 bg-white rounded-full shadow-sm text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3y-3.5 3.5"/></svg>
            </button>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 mb-1">うなぎ仔魚日齢管理</h1>
            <div id="current-date-display" class="text-lg font-bold text-blue-600">----/--/--</div>
            <div id="sync-status" class="text-[9px] text-slate-400 font-bold mt-1 uppercase tracking-widest">合言葉: <span id="active-key-name">unagi</span></div>
        </header>

        <div id="tanks-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global environment variables
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'unagi-shared-v6';
        
        // Default sync key
        let syncKey = localStorage.getItem('unagi_sync_key') || 'unagi';
        
        window.showSyncModal = () => { 
            document.getElementById('sync-key-input').value = syncKey;
            document.getElementById('sync-modal').style.display = 'flex'; 
        };
        window.hideSyncModal = () => { document.getElementById('sync-modal').style.display = 'none'; };
        window.saveSyncKey = () => {
            const val = document.getElementById('sync-key-input').value.trim();
            if(val) {
                localStorage.setItem('unagi_sync_key', val);
                location.reload();
            }
        };

        const tankCount = 10;
        function displayToday() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            document.getElementById('current-date-display').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 (${days[now.getDay()]})`;
        }

        // Firestore Path Helper (RULE 1: Must be /artifacts/{appId}/public/data/{collectionName})
        // Correction: The path must be interpreted as collection / document / collection / document...
        // To fix "must have an odd number of segments", we must ensure we use collection() for 5 segments
        // Path: artifacts (1) / {appId} (2) / public (3) / data (4) / {syncKey} (5)
        const getTankCollection = () => {
            return collection(db, 'artifacts', appId, 'public', 'data', syncKey);
        };

        window.saveData = async (index) => {
            const el = (id) => document.getElementById(id);
            const data = {
                tankLabel: el(`tank-label-${index}`).value,
                initial: el(`initial-${index}`).value,
                currentCount: el(`current-count-${index}`).value,
                birthDate: el(`date-${index}`).value,
                origin: el(`origin-${index}`).value,
                note: el(`note-${index}`).value,
                updatedAt: new Date().toISOString()
            };
            try {
                // Rule: Save to doc under the specific syncKey collection
                await setDoc(doc(getTankCollection(), `tank_${index}`), data, { merge: true });
            } catch (e) { 
                console.error("Save Error:", e); 
            }
        };

        window.updateSurvival = (index) => {
            const init = parseFloat(document.getElementById(`initial-${index}`).value) || 0;
            const curr = parseFloat(document.getElementById(`current-count-${index}`).value) || 0;
            document.getElementById(`rate-${index}`).innerText = (init > 0 ? (curr/init*100) : 0).toFixed(1) + "%";
            window.saveData(index);
        };

        window.updateAge = (index) => {
            const birth = document.getElementById(`date-${index}`).value;
            if (birth) {
                const bDate = new Date(birth); bDate.setHours(0,0,0,0);
                const today = new Date(); today.setHours(0,0,0,0);
                document.getElementById(`age-${index}`).innerText = Math.max(0, Math.floor((today-bDate)/86400000));
            }
            window.saveData(index);
        };

        function createUI() {
            const container = document.getElementById('tanks-container');
            const colors = ['blue', 'emerald', 'indigo', 'violet', 'rose', 'amber', 'cyan', 'teal', 'fuchsia', 'slate'];
            for (let i = 0; i < tankCount; i++) {
                const c = colors[i % colors.length];
                container.innerHTML += `
                <div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-200 p-4 unagi-card">
                    <div class="flex justify-between items-center mb-4">
                        <input type="text" id="tank-label-${i}" value="Tank ${String(i+1).padStart(2,'0')}" class="bg-${c}-50 text-${c}-600 px-3 py-1 rounded-full text-[10px] font-bold border-none w-24" oninput="saveData(${i})">
                        <div class="w-1.5 h-1.5 rounded-full bg-${c}-400"></div>
                    </div>
                    <div class="space-y-3 mb-4">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="initial-${i}" placeholder="投入" class="w-full bg-slate-50 rounded-lg px-2 py-1.5 text-sm font-bold border-none" oninput="updateSurvival(${i})">
                            <input type="number" id="current-count-${i}" placeholder="生存" class="w-full bg-slate-50 rounded-lg px-2 py-1.5 text-sm font-bold border-none" oninput="updateSurvival(${i})">
                        </div>
                        <div class="flex justify-between bg-${c}-50/30 p-2 rounded-lg text-[10px] font-bold border border-${c}-50/50">
                            <span class="text-slate-400">残存率</span><span id="rate-${i}" class="text-${c}-600 text-xs">0.0%</span>
                        </div>
                        <input type="date" id="date-${i}" class="w-full bg-slate-50 rounded-lg px-2 py-1 text-xs border-none" onchange="updateAge(${i})">
                        <input type="text" id="origin-${i}" placeholder="生誕地" class="w-full bg-slate-50 rounded-lg px-2 py-1 text-xs border-none" oninput="saveData(${i})">
                        <textarea id="note-${i}" rows="2" placeholder="備考..." class="w-full bg-slate-50 rounded-lg px-2 py-1 text-[10px] border-none resize-none" oninput="saveData(${i})"></textarea>
                    </div>
                    <div class="text-center py-3 bg-gradient-to-br from-white to-${c}-50/30 rounded-xl border border-${c}-50">
                        <div id="age-${i}" class="text-3xl font-black text-slate-800 tracking-tighter">--</div>
                        <div class="text-[9px] font-bold text-${c}-500 uppercase">Days Old</div>
                    </div>
                </div>`;
            }
        }

        async function startApp() {
            document.getElementById('active-key-name').innerText = syncKey;
            
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // Corrected: Watch the specific collection for the syncKey
                    const colRef = getTankCollection();
                    
                    onSnapshot(colRef, (snap) => {
                        snap.docChanges().forEach(change => {
                            const docId = change.doc.id; // docId is "tank_0", "tank_1", etc.
                            if (docId.startsWith('tank_')) {
                                const idx = parseInt(docId.split('_').pop());
                                const data = change.doc.data();
                                const el = (id) => document.getElementById(id);
                                
                                if (document.activeElement !== el(`tank-label-${idx}`)) el(`tank-label-${idx}`).value = data.tankLabel || "";
                                if (document.activeElement !== el(`initial-${idx}`)) el(`initial-${idx}`).value = data.initial || "";
                                if (document.activeElement !== el(`current-count-${idx}`)) el(`current-count-${idx}`).value = data.currentCount || "";
                                if (document.activeElement !== el(`date-${idx}`)) el(`date-${idx}`).value = data.birthDate || "";
                                if (document.activeElement !== el(`origin-${idx}`)) el(`origin-${idx}`).value = data.origin || "";
                                if (document.activeElement !== el(`note-${idx}`)) el(`note-${idx}`).value = data.note || "";
                                
                                const iV = parseFloat(data.initial) || 0, cV = parseFloat(data.currentCount) || 0;
                                el(`rate-${idx}`).innerText = (iV > 0 ? (cV/iV*100) : 0).toFixed(1) + "%";
                                if (data.birthDate) {
                                    const b = new Date(data.birthDate); b.setHours(0,0,0,0);
                                    const t = new Date(); t.setHours(0,0,0,0);
                                    el(`age-${idx}`).innerText = Math.max(0, Math.floor((t-b)/86400000));
                                }
                            }
                        });
                        document.getElementById('loading').style.display = 'none';
                    }, (error) => {
                        console.error("Snapshot Error:", error);
                        document.getElementById('loading').style.display = 'none';
                    });
                }
            });
        }

        displayToday();
        createUI();
        startApp();
    </script>
</body>
</html>
